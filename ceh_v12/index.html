  },
];

function App() {
  const [selDomain, setSelDomain] = useState("all");
  const [selCat, setSelCat] = useState("All");
  const [selDiff, setSelDiff] = useState("All");
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [review, setReview] = useState(new Set());
  const [showFilter, setShowFilter] = useState(false);
  const [onlyReview, setOnlyReview] = useState(false);
  const [animDir, setAnimDir] = useState(null);
  const cardRef = useRef(null);

  const activeDomain = DOMAINS.find(d => d.key === selDomain);
  const domainCats = activeDomain ? activeDomain.cats : null;

  const filtered = CARDS.filter(c => {
    const domainOk = !domainCats || domainCats.includes(c.cat);
    const catOk = selCat === "All" || c.cat === selCat;
    const diffOk = selDiff === "All" || c.diff === selDiff;
    const revOk = !onlyReview || review.has(c.id);
    return domainOk && catOk && diffOk && revOk;
  });

  const switchDomain = (key) => { setSelDomain(key); setSelCat("All"); setIdx(0); setFlipped(false); };

  // ── DERIVED VALUES (must come before callbacks that use them) ─────────────
  const safeIdx = Math.min(idx, Math.max(0, filtered.length - 1));
  const card = filtered[safeIdx];
  const total = filtered.length;
  const knownInFilter = filtered.filter(c => known.has(c.id)).length;
  const progress = total > 0 ? Math.round((knownInFilter / total) * 100) : 0;

  // ── CALLBACKS ─────────────────────────────────────────────────────────────
  const go = useCallback((dir) => {
    setAnimDir(dir > 0 ? "next" : "prev");
    setFlipped(false);
    setTimeout(() => {
      setIdx(i => {
        const next = i + dir;
        if (next < 0) return filtered.length - 1;
        if (next >= filtered.length) return 0;
        return next;
      });
      setAnimDir(null);
    }, 180);
  }, [filtered.length]);

  const markKnown = useCallback(() => {
    if (!card) return;
    setKnown(s => { const n = new Set(s); n.add(card.id); return n; });
    setReview(s => { const n = new Set(s); n.delete(card.id); return n; });
    go(1);
  }, [card, go]);

  const markReview = useCallback(() => {
    if (!card) return;
    setReview(s => { const n = new Set(s); n.add(card.id); return n; });
    setKnown(s => { const n = new Set(s); n.delete(card.id); return n; });
    go(1);
  }, [card, go]);

  // ── LOCALSTORAGE PERSISTENCE ──────────────────────────────────────────────
  const LS_KEY = 'ceh_v12_fc_state';

  // Load on mount only
  useEffect(() => {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const s = JSON.parse(raw);
      if (s.selDomain) setSelDomain(s.selDomain);
      if (s.selCat)    setSelCat(s.selCat);
      if (s.selDiff)   setSelDiff(s.selDiff);
      if (typeof s.idx === 'number') setIdx(s.idx);
      if (s.known)  setKnown(new Set(s.known));
      if (s.review) setReview(new Set(s.review));
      if (s.onlyReview) setOnlyReview(true);
    } catch(e) {}
  }, []); // eslint-disable-line

  // Save whenever state that matters changes — use raw idx (not safeIdx) to avoid derived-value lag
  useEffect(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        selDomain, selCat, selDiff, idx,
        known: [...known], review: [...review], onlyReview,
      }));
    } catch(e) {}
  }, [selDomain, selCat, selDiff, idx, known, review, onlyReview]);

  // ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === 'l') go(1);
      else if (e.key === 'ArrowLeft' || e.key === 'h') go(-1);
      else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); setFlipped(f => !f); }
      else if (e.key === 'g') markKnown();
      else if (e.key === 'r') markReview();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [go, markKnown, markReview]);

  const catColor = card ? (CAT_COLORS[card.cat] || "#60a5fa") : "#60a5fa";
  const diffColor = card ? (DIFF_COLORS[card.diff] || "#94a3b8") : "#94a3b8";

  if (!card) return (
    <div style={{ minHeight:"100vh", background:"#060a12", display:"flex", alignItems:"center", justifyContent:"center", color:"#94a3b8", fontFamily:"monospace" }}>
      No cards match current filters. <button onClick={() => { setSelDomain("all"); setSelCat("All"); setSelDiff("All"); setOnlyReview(false); }} style={{ marginLeft:12, background:"none", border:"1px solid #334155", color:"#60a5fa", padding:"4px 12px", borderRadius:6, cursor:"pointer" }}>Reset</button>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:"#060a12", color:"#e2e8f0", fontFamily:"'Courier New', monospace", padding:"20px 16px 60px", display:"flex", flexDirection:"column", alignItems:"center" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .flip-card { perspective: 1400px; }
        .flip-inner { transition: transform 0.45s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; position: relative; }
        .flip-inner.flipped { transform: rotateY(180deg); }
        .face { position: absolute; top:0; left:0; width:100%; height:100%; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:20px; }
        .face-back { transform: rotateY(180deg); }
        .slide-next { animation: slideNext 0.18s ease; }
        .slide-prev { animation: slidePrev 0.18s ease; }
        @keyframes slideNext { from { opacity:0.3; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }
        @keyframes slidePrev { from { opacity:0.3; transform: translateX(-30px); } to { opacity:1; transform: translateX(0); } }
        .btn { transition: all 0.15s; cursor: pointer; }
        .btn:hover { filter: brightness(1.25); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .catpill { transition: all 0.12s; cursor: pointer; }
        .catpill:hover { filter: brightness(1.3); }
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:#0b0f1a; }
        ::-webkit-scrollbar-thumb { background:#1e293b; border-radius:3px; }
        .scanline { position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px); border-radius:20px; pointer-events:none; }
        .glow-text { text-shadow: 0 0 30px currentColor; }
      `}</style>

      {/* ── HEADER ── */}
      <div style={{ width:"100%", maxWidth:820, marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
          <div>
            <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:26, color:"#e2e8f0", letterSpacing:1 }}>
              CEH <span style={{ color:"#38bdf8" }} className="glow-text">v12</span>
            </div>
            <div style={{ fontSize:15, color:"#334155", letterSpacing:4, marginTop:2, fontFamily:"'Syne Mono', monospace" }}>
              FLASHCARD TRAINER · {CARDS.length} QUESTIONS · 312-50
            </div>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <div style={{ background:"#0f2a1a", border:"1px solid #166534", borderRadius:8, padding:"5px 12px", fontSize:15, color:"#4ade80", fontFamily:"'Syne Mono',monospace" }}>✓ {known.size} known</div>
            <div style={{ background:"#2a1a00", border:"1px solid #713f12", borderRadius:8, padding:"5px 12px", fontSize:15, color:"#fbbf24", fontFamily:"'Syne Mono',monospace" }}>⚑ {review.size} review</div>
            <button className="btn" onClick={() => setOnlyReview(r => !r)} style={{ background: onlyReview ? "#fbbf2422" : "transparent", border:"1px solid " + (onlyReview ? "#fbbf2466" : "#1e293b"), borderRadius:8, padding:"5px 12px", fontSize:15, color: onlyReview ? "#fbbf24" : "#475569", cursor:"pointer", fontFamily:"'Syne Mono',monospace" }}>Review Mode</button>
            <button className="btn" onClick={() => { setKnown(new Set()); setReview(new Set()); setIdx(0); setFlipped(false); setSelDomain("all"); setSelCat("All"); setSelDiff("All"); try { localStorage.removeItem(LS_KEY); } catch(e) {} }} style={{ background:"transparent", border:"1px solid #1e293b", borderRadius:8, padding:"5px 12px", fontSize:15, color:"#475569", cursor:"pointer", fontFamily:"'Syne Mono',monospace" }}>Reset</button>
          </div>
        </div>

        {/* Progress */}
        <div style={{ marginTop:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
            <span style={{ fontSize:15, color:"#334155", letterSpacing:2 }}>PROGRESS</span>
            <span style={{ fontSize:15, color:"#38bdf8", fontFamily:"'Syne Mono',monospace" }}>{progress}%</span>
          </div>
          <div style={{ height:3, background:"#0f172a", borderRadius:2, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${progress}%`, background:"linear-gradient(90deg,#38bdf8,#4ade80)", borderRadius:2, transition:"width 0.5s ease" }} />
          </div>
        </div>
      </div>

      {/* ── DOMAIN BANNER ── */}
      <div style={{ width:"100%", maxWidth:820, marginBottom:14 }}>
        <div style={{ fontSize:13, color:"#334155", letterSpacing:3, fontFamily:"'Syne Mono',monospace", marginBottom:6 }}>EXAM DOMAIN FOCUS:</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6 }}>
          {/* All domains */}
          {(() => {
            const totalKnown = CARDS.filter(c=>known.has(c.id)).length;
            const isActive = selDomain === "all";
            return (
              <button key="all" onClick={() => switchDomain("all")} style={{
                background: isActive ? "#38bdf811" : "#0d1117",
                border: `1px solid ${isActive ? "#38bdf855" : "#1e293b"}`,
                borderRadius:8, padding:"8px 6px", cursor:"pointer", textAlign:"left",
              }}>
                <div style={{ fontSize:13, color: isActive ? "#38bdf8" : "#475569", fontFamily:"'Syne Mono',monospace", fontWeight:"bold", marginBottom:2 }}>ALL</div>
                <div style={{ fontSize:12, color:"#334155", fontFamily:"'Syne Mono',monospace", marginBottom:4 }}>200 questions</div>
                <div style={{ height:2, background:"#0f172a", borderRadius:1 }}>
                  <div style={{ height:"100%", width:`${CARDS.length>0?Math.round((totalKnown/CARDS.length)*100):0}%`, background:"#38bdf8", borderRadius:1, transition:"width 0.4s" }} />
                </div>
                <div style={{ fontSize:12, color:"#38bdf8", fontFamily:"'Syne Mono',monospace", marginTop:3 }}>{totalKnown}/{CARDS.length} known</div>
              </button>
            );
          })()}
          {DOMAINS.map(d => {
            const domCards = CARDS.filter(c => d.cats.includes(c.cat));
            const domKnown = domCards.filter(c => known.has(c.id)).length;
            const pct = domCards.length > 0 ? Math.round((domKnown/domCards.length)*100) : 0;
            const isActive = selDomain === d.key;
            return (
              <button key={d.key} onClick={() => switchDomain(d.key)} style={{
                background: isActive ? `${d.color}11` : "#0d1117",
                border: `1px solid ${isActive ? d.color+"55" : "#1e293b"}`,
                borderRadius:8, padding:"8px 6px", cursor:"pointer", textAlign:"left",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:2 }}>
                  <div style={{ fontSize:13, color: isActive ? d.color : "#475569", fontFamily:"'Syne Mono',monospace", fontWeight:"bold", lineHeight:1.3 }}>{d.label}</div>
                  <div style={{ fontSize:13, color: d.color, fontFamily:"'Syne Mono',monospace", opacity:0.8, flexShrink:0, marginLeft:4 }}>{d.weight}</div>
                </div>
                <div style={{ fontSize:12, color:"#334155", fontFamily:"'Syne Mono',monospace", marginBottom:4, lineHeight:1.3 }}>{domCards.length} questions</div>
                <div style={{ height:2, background:"#0f172a", borderRadius:1 }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:d.color, borderRadius:1, transition:"width 0.4s" }} />
                </div>
                <div style={{ fontSize:12, color:d.color, fontFamily:"'Syne Mono',monospace", marginTop:3 }}>{domKnown}/{domCards.length} known</div>
              </button>
            );
          })}
        </div>
        {activeDomain && (
          <div style={{ marginTop:6, fontSize:13, color: activeDomain.color, fontFamily:"'Syne Mono',monospace", opacity:0.7 }}>
            ↳ {activeDomain.desc}
          </div>
        )}
      </div>

      {/* ── FILTER ROW ── */}
      <div style={{ width:"100%", maxWidth:820, marginBottom:16 }}>
        {/* Difficulty */}
        <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
          <span style={{ fontSize:15, color:"#334155", letterSpacing:2, alignSelf:"center", marginRight:4 }}>DIFFICULTY:</span>
          {DIFFS.map(d => (
            <button key={d} className="catpill" onClick={() => { setSelDiff(d); setIdx(0); setFlipped(false); }} style={{
              padding:"3px 12px", borderRadius:20, fontSize:15, cursor:"pointer", border:"1px solid",
              fontFamily:"'Syne Mono',monospace", letterSpacing:0.5,
              background: selDiff===d ? `${d==="All"?"#38bdf8":DIFF_COLORS[d]}22` : "transparent",
              color: selDiff===d ? (d==="All"?"#38bdf8":DIFF_COLORS[d]) : "#334155",
              borderColor: selDiff===d ? `${d==="All"?"#38bdf8":DIFF_COLORS[d]}66` : "#1e293b",
            }}>{d==="All" ? "All" : DIFF_LABELS[d]}</button>
          ))}
        </div>
        {/* Categories — filtered to active domain; "All" resets to full deck */}
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          {CATEGORIES.filter(cat => cat === "All" || !domainCats || domainCats.includes(cat)).map(cat => {
            const col = cat==="All" ? "#38bdf8" : (CAT_COLORS[cat]||"#94a3b8");
            const active = selCat===cat;
            // "All" always counts the full 200, domain pills count their own cards
            const catCards = cat==="All" ? CARDS : CARDS.filter(c=>c.cat===cat);
            const catKnown = catCards.filter(c=>known.has(c.id)).length;
            return (
              <button key={cat} className="catpill" onClick={() => {
                if (cat === "All") { switchDomain("all"); } // reset domain too
                else { setSelCat(cat); setIdx(0); setFlipped(false); }
              }} style={{
                padding:"3px 10px", borderRadius:20, fontSize:15, cursor:"pointer", border:"1px solid",
                fontFamily:"'Syne Mono',monospace",
                background: active ? `${col}22` : "transparent",
                color: active ? col : "#475569",
                borderColor: active ? `${col}55` : "#0f172a",
              }}>
                {cat} <span style={{ opacity:0.5 }}>{catKnown}/{catCards.length}</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* ── CARD META ── */}
      <div style={{ width:"100%", maxWidth:820, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
        <div style={{ fontFamily:"'Syne Mono',monospace", fontSize:15, color:"#1e293b" }}>
          {safeIdx+1} <span style={{ color:"#0f172a" }}>/</span> {total}
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontFamily:"'Syne Mono',monospace", fontSize:15, color:catColor }}>{card.cat}</span>
          <span style={{ fontFamily:"'Syne Mono',monospace", fontSize:15, color:diffColor, background:`${diffColor}15`, padding:"2px 8px", borderRadius:10, border:`1px solid ${diffColor}33` }}>
            {DIFF_LABELS[card.diff]}
          </span>
          {known.has(card.id) && <span style={{ fontSize:15, color:"#4ade80", background:"#4ade8011", padding:"2px 8px", borderRadius:10, border:"1px solid #4ade8030" }}>✓ known</span>}
          {review.has(card.id) && <span style={{ fontSize:15, color:"#fbbf24", background:"#fbbf2411", padding:"2px 8px", borderRadius:10, border:"1px solid #fbbf2430" }}>⚑ review</span>}
        </div>
        <button className="btn" onClick={() => { const r = Math.floor(Math.random()*filtered.length); setIdx(r); setFlipped(false); }} style={{ background:"transparent", border:"1px solid #0f172a", borderRadius:6, padding:"3px 10px", fontSize:15, color:"#334155", cursor:"pointer", fontFamily:"'Syne Mono',monospace" }}>⟳ random</button>
      </div>

      {/* ── FLIP CARD ── */}
      <div className={`flip-card ${animDir==="next"?"slide-next":animDir==="prev"?"slide-prev":""}`} onClick={() => setFlipped(f=>!f)} style={{ width:"100%", maxWidth:820, height:320, marginBottom:20, cursor:"pointer" }}>
        <div className={`flip-inner ${flipped?"flipped":""}`} style={{ width:"100%", height:320 }}>
          {/* Front */}
          <div className="face" style={{
            background:`linear-gradient(145deg, #0d1117 0%, #111827 50%, #0d1825 100%)`,
            border:`1px solid ${catColor}33`,
            boxShadow:`0 0 60px ${catColor}0a, 0 2px 40px rgba(0,0,0,0.5)`,
            display:"flex", flexDirection:"column", padding:"28px 32px",
          }}>
            <div className="scanline" />
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:catColor, boxShadow:`0 0 10px ${catColor}` }} />
              <span style={{ fontSize:13, color:catColor, letterSpacing:4, fontFamily:"'Syne Mono',monospace" }}>QUESTION #{card.id}</span>
            </div>
            <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <div style={{ fontSize:16, lineHeight:1.8, color:"#cbd5e1", textAlign:"center", fontFamily:"'Syne Mono',monospace", maxWidth:680 }}>
                {card.q}
              </div>
            </div>
            <div style={{ textAlign:"center", fontSize:13, color:"#1e293b", letterSpacing:3, fontFamily:"'Syne Mono',monospace" }}>CLICK TO REVEAL</div>
          </div>

          {/* Back */}
          <div className="face face-back" style={{
            background:`linear-gradient(145deg, #0a1a0f 0%, #0f2010 50%, #0a1a14 100%)`,
            border:`1px solid #4ade8033`,
            boxShadow:`0 0 60px #4ade800a, 0 2px 40px rgba(0,0,0,0.5)`,
            display:"flex", flexDirection:"column", padding:"28px 32px",
            overflowY:"auto",
          }}>
            <div className="scanline" />
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:"#4ade80", boxShadow:"0 0 10px #4ade80" }} />
              <span style={{ fontSize:13, color:"#4ade80", letterSpacing:4, fontFamily:"'Syne Mono',monospace" }}>ANSWER</span>
            </div>
            <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", overflowY:"auto" }}>
              <div style={{ fontSize:14, lineHeight:1.9, color:"#86efac", textAlign:"center", fontFamily:"'Syne Mono',monospace", whiteSpace:"pre-wrap", maxWidth:700 }}>
                {card.a}
              </div>
            </div>
            <div style={{ textAlign:"center", fontSize:13, color:"#166534", letterSpacing:3, fontFamily:"'Syne Mono',monospace", marginTop:12 }}>CLICK TO RETURN</div>
          </div>
        </div>
      </div>

      {/* ── CONTROLS ── */}
      <div style={{ width:"100%", maxWidth:820, display:"flex", gap:8, justifyContent:"center", alignItems:"center", flexWrap:"wrap" }}>
        <button className="btn" onClick={() => go(-1)} style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:12, padding:"13px 20px", fontSize:18, color:"#475569", cursor:"pointer" }}>←</button>
        <button className="btn" onClick={markReview} style={{ flex:1, maxWidth:200, background:"#2a1a0011", border:"1px solid #fbbf2433", borderRadius:12, padding:"13px 16px", fontSize:15, color:"#fbbf24", cursor:"pointer", fontFamily:"'Syne Mono',monospace", letterSpacing:1 }}>⚑ NEEDS REVIEW</button>
        <button className="btn" onClick={markKnown} style={{ flex:1, maxWidth:200, background:"#0a1a0f11", border:"1px solid #4ade8033", borderRadius:12, padding:"13px 16px", fontSize:15, color:"#4ade80", cursor:"pointer", fontFamily:"'Syne Mono',monospace", letterSpacing:1 }}>✓ GOT IT</button>
        <button className="btn" onClick={() => go(1)} style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:12, padding:"13px 20px", fontSize:18, color:"#475569", cursor:"pointer" }}>→</button>
      </div>

      {/* ── CATEGORY GRID ── */}
      <div style={{ width:"100%", maxWidth:820, marginTop:32, display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))", gap:6 }}>
        {CATEGORIES.slice(1).filter(cat => !domainCats || domainCats.includes(cat)).map(cat => {
          const catCards = CARDS.filter(c=>c.cat===cat);
          const catKnown = catCards.filter(c=>known.has(c.id)).length;
          const pct = catCards.length > 0 ? Math.round((catKnown/catCards.length)*100) : 0;
          const col = CAT_COLORS[cat] || "#94a3b8";
          return (
            <div key={cat} className="catpill" onClick={() => { setSelCat(cat); setIdx(0); setFlipped(false); }} style={{ background:"#0d1117", border:`1px solid ${col}15`, borderRadius:8, padding:"8px 10px", cursor:"pointer" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                <span style={{ fontSize:15, color:col, fontFamily:"'Syne Mono',monospace" }}>{cat}</span>
                <span style={{ fontSize:13, color:"#1e293b", fontFamily:"'Syne Mono',monospace" }}>{catKnown}/{catCards.length}</span>
              </div>
              <div style={{ height:2, background:"#0f172a", borderRadius:1 }}>
                <div style={{ height:"100%", width:`${pct}%`, background:col, borderRadius:1, transition:"width 0.4s ease", opacity:0.8 }} />
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop:28, fontSize:13, color:"#0f172a", letterSpacing:3, fontFamily:"'Syne Mono',monospace" }}>
        EC-COUNCIL 312-50v12 · {CARDS.length} EXAM-PATTERN QUESTIONS
      </div>


      <div style={{ width:"100%", maxWidth:820, display:"flex", gap:8, justifyContent:"center", alignItems:"center", flexWrap:"wrap" }}>
        Keyboard shortcuts: ←/→ navigate, Space/Enter flip, g = got it, r = needs review.
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
